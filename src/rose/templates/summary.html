<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Petals Around the Rose: Approach Summary</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>
<body>
  <main class="container py-4">
    <h1 class="mb-4">Petals Around the Rose: Approach Summary</h1>

    <section class="mb-5">
      <h2>Summary</h2>
      <div class="table-responsive text-end">
        {{ summary_table | safe }}
      </div>
    </section>

    {% for approach in approaches %}
    <section class="mb-5">
      <h2>{{ approach.title }}</h2>

      <div class="row mb-3">
        {% for label, value in approach.metrics.items() %}
        <div class="col-6 col-md-3">
          <div class="card mb-2">
            <div class="card-body py-2">
              <div class="text-muted small">{{ label }}</div>
              <div class="fs-5">{{ value }}</div>
            </div>
          </div>
        </div>
        {% endfor %}
      </div>

      <div class="row g-3">
        <div class="col-12 col-lg-6">
          <img src="{{ approach.learning_plot }}" class="img-fluid border rounded" alt="Learning curve">
        </div>
        <div class="col-12 col-lg-6 d-flex justify-content-end">
          <img src="{{ approach.scatter_plot }}" class="img-fluid border rounded" alt="Actual vs. predicted">
        </div>
      </div>
    </section>
    {% endfor %}
  </main>
</body>
</html>
