fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.0
    hooks:
      # Lint and auto-fix issues (imports, static checks, etc.)
      - id: ruff-check
        args: [--fix]

      # Format code (Black-compatible)
      - id: ruff-format
  - repo: local
    hooks:
      - id: pytest-smoke
        name: pytest smoke tests
        entry: .venv/Scripts/python.exe -m pytest tests/test_smoke.py
        language: system
        pass_filenames: false
        always_run: true
